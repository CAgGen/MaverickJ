# Option A: Unified switch (disabled; using Option B mixed-model routing)
# default_provider: Claude
# default_model: claude-haiku-4-5-20251001
# default_temperature: 0.4
# default_max_tokens: 8192

# Option B: Mixed-model routing
# Roles requiring deep reasoning/creative argumentation → Sonnet (smarter)
# Roles with structured analysis/mechanical scoring     → Haiku (faster)
agents:
  advocate:
    provider: claude
    model: claude-sonnet-4-6 # Builds strongest arguments — deep creative reasoning
    temperature: 0.6
    max_tokens: 8192
  critic:
    provider: claude
    model: claude-sonnet-4-6  # Finds hardest-to-spot flaws — most rigorous adversarial reasoning
    temperature: 0.6
    max_tokens: 8192
  fact_checker:
    provider: claude
    model: claude-haiku-4-5  # Structured pattern-matching against logical fallacies — analytical, not creative
    temperature: 0.3
    max_tokens: 8192
  moderator:
    provider: claude
    model: claude-haiku-4-5  # Convergence scoring and round summaries — mechanical task
    temperature: 0.4
    max_tokens: 4096
  report_generator:
    provider: claude
    model: claude-sonnet-4-6  # Final deliverable the user reads — synthesis quality matters most
    temperature: 0.4
    max_tokens: 8192

debate:
  max_rounds: 5
  convergence_threshold: 2
  convergence_score_target: 0.8
  language: auto
  transcript_compression_after_round: 2
